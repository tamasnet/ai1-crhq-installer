# Complete sample package for ai1-crhq-installer — exercises every component type.
# Run it isolated:   node scripts/install.mjs examples/bundle --sandbox --lifecycle
name: ai1-sample-bundle
version: 0.1.0
description: >
  Reference package demonstrating every ai1-crhq-installer component type: a skill, a recipe, an
  agent that wires them together, an hourly background job, and a service (nginx + PM2). Built to be
  run under --sandbox --lifecycle; a real (non-sandbox) install also deploys the service live.
installer: ">=0.1.0"

# Install order = type order below, then array order within a type. Uninstall reverses.
components:
  skills:
    - path: skills/ai1-sample-skill
      version: 0.1.0
  recipes:
    - path: recipes/ai1-sample-recipe.md
  agents:
    - path: agents/ai1-sample-agent.md
  jobs:
    - path: jobs/ai1-sample-job.yaml
  services:
    - path: services/ai1-sample-svc
      version: 0.1.0

# Optional package-specific hook, invoked after the declarative pass (all modes).
install_entry: scripts/install.mjs
install_flags:
  - name: --skip-extra
    description: Example package-specific flag (forwarded to install_entry).
