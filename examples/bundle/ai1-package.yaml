# Complete sample package for ai1-satellite-tools — exercises DB component types plus a service.
# Run it isolated:   node scripts/install.mjs examples/bundle --sandbox --lifecycle
name: ai1-sample-bundle
version: 1
description: >
  Reference package demonstrating core ai1-satellite-tools component types: a skill, a recipe, an
  agent that wires them together, an hourly background job, and a service (nginx + PM2). Built to be
  run under --sandbox --lifecycle; a real (non-sandbox) install also deploys the service live.
installer: 2                   # min installer version (manifest v2)

# Install order = type order below, then array order within a type. Uninstall reverses.
components:
  skills:
    - path: skills/ai1-sample-skill.md
      version: 1
  recipes:
    - path: recipes/ai1-sample-recipe.md
  agents:
    - path: agents/ai1-sample-agent.md
  jobs:
    - path: jobs/ai1-sample-job.yaml
  services:
    - path: services/ai1-sample-svc
      version: 1

# Optional package after script, invoked after the declarative pass (all modes).
after: scripts/install.mjs
flags:
  - name: --skip-extra
    description: Example package-specific flag (forwarded to hook scripts).
